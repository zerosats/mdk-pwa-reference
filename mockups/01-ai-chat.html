<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Chat — MDK</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">

    <div class="header">
      <div class="header-left">
        <div class="avatar avatar-violet" style="width: 36px; height: 36px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="12" cy="15" r="2"/></svg>
        </div>
        <div>
          <div style="font-size: 16px; font-weight: 700;">MDK AI</div>
          <div class="encryption-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Encrypted
          </div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </div>

    <div class="messages">
      <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px 20px;">
        <div class="avatar avatar-lg avatar-violet">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="12" cy="15" r="2"/></svg>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; margin-bottom: 6px;">Private AI Assistant</div>
          <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.6;">
            Your conversation is encrypted end-to-end.<br>No one can read your messages.
          </div>
        </div>
      </div>

      <div class="suggestions">
        <button class="suggestion-chip">Analyze my spending this month</button>
        <button class="suggestion-chip">Set up an agent to pay my invoices</button>
        <button class="suggestion-chip">How does MLS encryption protect me?</button>
        <button class="suggestion-chip">What's the current Bitcoin mempool like?</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <input class="input-field" placeholder="Message..." />
        <button class="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item active" href="01-ai-chat.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/><circle cx="12" cy="15" r="2"/></svg>
        <span class="nav-label">AI</span>
      </a>
      <a class="nav-item" href="02-chats-list.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="nav-label">Chats</span>
        <span class="nav-badge">3</span>
      </a>
      <a class="nav-item" href="04-agents.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span class="nav-label">Agents</span>
      </a>
      <a class="nav-item" href="05-wallet.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1"/></svg>
        <span class="nav-label">Wallet</span>
      </a>
    </nav>
  </div>
</body>
</html>
