[package]
name = "mdk-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM bindings for MDK - Marmot Development Kit"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
mdk-core = { path = "../mdk/crates/mdk-core" }
mdk-memory-storage = { path = "../mdk/crates/mdk-memory-storage" }
mdk-storage-traits = { path = "../mdk/crates/mdk-storage-traits" }

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"

getrandom = { version = "0.3", features = ["wasm_js"] }
thiserror = "2"
console_error_panic_hook = "0.1"
hex = "0.4"
nostr = { version = "0.44", default-features = false, features = ["std"] }
postcard = { version = "1.1", features = ["alloc"] }
openmls = { version = "0.8", default-features = false, features = ["js"] }
openmls_traits = { version = "0.5", default-features = false }

[dev-dependencies]
wasm-bindgen-test = "0.3"
